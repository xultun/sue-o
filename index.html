<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ahorro Diario</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gray-50 py-10 px-4 font-sans text-gray-800">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-6">
        
        <!-- Encabezado -->
        <header class="text-center">
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">Mi Progreso Diario</h1>
            <p class="text-sm text-gray-500 mt-1">Define tu meta y acumula tus montos del día</p>
        </header>

        <!-- Configuración de la Meta -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-2">
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider">Configurar Meta del Día (S/)</label>
            <div class="flex space-x-2">
                <input 
                    type="number" 
                    id="meta-input" 
                    placeholder="Ej. 100.00" 
                    class="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 text-sm font-medium"
                />
                <button 
                    id="btn-fijar-meta" 
                    class="bg-gray-900 text-white text-xs font-medium px-4 py-2 rounded-lg hover:bg-gray-800 transition-colors cursor-pointer"
                >
                    Fijar Meta
                </button>
            </div>
        </div>

        <!-- Panel de Progreso Visual y Barra -->
        <div class="bg-gray-950 text-white rounded-xl p-5 shadow-inner space-y-4">
            <div class="flex justify-between items-end">
                <div>
                    <span class="text-xs uppercase tracking-wider text-gray-400 font-medium">Acumulado Hoy</span>
                    <h2 id="txt-acumulado" class="text-3xl font-extrabold mt-0.5">S/ 0.00</h2>
                </div>
                <div class="text-right">
                    <span class="text-xs uppercase tracking-wider text-gray-400 font-medium">Meta del Día</span>
                    <h3 id="txt-meta" class="text-lg font-bold text-gray-200 mt-0.5">S/ 0.00</h3>
                </div>
            </div>

            <!-- Barra de progreso -->
            <div class="w-full bg-gray-800 rounded-full h-3 overflow-hidden">
                <div id="barra-progreso" class="bg-emerald-500 h-full w-0 transition-all duration-500 ease-out"></div>
            </div>
            
            <div class="flex justify-between text-[11px] text-gray-400 font-medium">
                <span id="txt-porcentaje">0% alcanzado</span>
                <span id="txt-restante">Faltan S/ 0.00</span>
            </div>
        </div>

        <!-- Formulario para Registrar Montos -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Monto a subir (S/)</label>
                <input
                    type="number"
                    id="monto-subir"
                    step="0.01"
                    placeholder="0.00"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:bg-white transition-all text-lg font-bold text-center"
                />
            </div>

            <button
                id="btn-ahorrar"
                type="button"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-lg transition-colors shadow-sm active:scale-[0.99] transform cursor-pointer tracking-wide uppercase text-sm"
            >
                💰 Ahorré Hoy
            </button>
        </div>

        <!-- Historial Simple -->
        <div class="space-y-3 pt-2 border-t border-gray-100">
            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Depósitos del día</h4>
            <div id="historial-lista" class="max-h-40 overflow-y-auto space-y-2 pr-1">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <!-- Botón de reinicio absoluto -->
        <div class="text-center pt-2">
            <button 
                id="btn-limpiar-todo" 
                class="text-xs text-gray-400 hover:text-red-500 font-medium transition-colors underline cursor-pointer"
            >
                Limpiar datos antiguos y empezar de 0
            </button>
        </div>

    </div>

    <script>
        // Claves exclusivas de almacenamiento para evitar mezclas
        const KEY_ACUMULADO = 'ahorro_diario_acumulado';
        const KEY_META = 'ahorro_diario_meta';
        const KEY_HISTORIAL = 'ahorro_diario_historial';

        // Cargar datos iniciales o empezar estrictamente en 0
        let acumulado = parseFloat(localStorage.getItem(KEY_ACUMULADO)) || 0.00;
        let meta = parseFloat(localStorage.getItem(KEY_META)) || 0.00;
        let historial = JSON.parse(localStorage.getItem(KEY_HISTORIAL)) || [];

        // Elementos del DOM
        const metaInput = document.getElementById('meta-input');
        const btnFijarMeta = document.getElementById('btn-fijar-meta');
        const montoSubir = document.getElementById('monto-subir');
        const btnAhorrar = document.getElementById('btn-ahorrar');
        const btnLimpiarTodo = document.getElementById('btn-limpiar-todo');

        const txtAcumulado = document.getElementById('txt-acumulado');
        const txtMeta = document.getElementById('txt-meta');
        const barraProgreso = document.getElementById('barra-progreso');
        const txtPorcentaje = document.getElementById('txt-porcentaje');
        const txtRestante = document.getElementById('txt-restante');
        const historialLista = document.getElementById('historial-lista');

        // Función para actualizar y renderizar todos los cálculos en la pantalla
        function actualizarInterfaz() {
            // Guardar en almacenamiento local
            localStorage.setItem(KEY_ACUMULADO, acumulado.toString());
            localStorage.setItem(KEY_META, meta.toString());
            localStorage.setItem(KEY_HISTORIAL, JSON.stringify(historial));

            // Imprimir textos principales
            txtAcumulado.textContent = `S/ ${acumulado.toFixed(2)}`;
            txtMeta.textContent = `S/ ${meta.toFixed(2)}`;

            // Calcular porcentaje y restante
            let porcentaje = 0;
            if (meta > 0) {
                porcentaje = Math.min((acumulado / meta) * 100, 100);
            }
            
            let restante = meta - acumulado;
            if (restante < 0) restante = 0;

            // Actualizar elementos visuales de la barra
            barraProgreso.style.width = `${porcentaje}%`;
            txtPorcentaje.textContent = `${Math.round(porcentaje)}% alcanzado`;
            txtRestante.textContent = restante > 0 ? `Faltan S/ ${restante.toFixed(2)}` : '¡Meta cumplida! 🎉';

            // Renderizar lista del historial inferior
            historialLista.innerHTML = '';
            if (historial.length === 0) {
                historialLista.innerHTML = `<p class="text-xs text-gray-400 text-center py-2">Ningún movimiento hoy.</p>`;
            } else {
                historial.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "flex justify-between items-center bg-gray-50 px-3 py-2 rounded-lg text-xs border border-gray-100";
                    itemDiv.innerHTML = `
                        <span class="text-gray-400 font-mono">${item.hora}</span>
                        <span class="font-bold text-gray-900">+ S/ ${parseFloat(item.monto).toFixed(2)}</span>
                    `;
                    historialLista.appendChild(itemDiv);
                });
            }
        }

        // Acción: Fijar la Meta Diaria
        btnFijarMeta.addEventListener('click', () => {
            const valorMeta = parseFloat(metaInput.value);
            if (isNaN(valorMeta) || valorMeta <= 0) {
                alert("Por favor, ingresa una meta válida mayor a 0.");
                return;
            }
            meta = valorMeta;
            metaInput.value = '';
            actualizarInterfaz();
        });

        // Acción: Agregar Monto usando el botón "Ahorré Hoy"
        btnAhorrar.addEventListener('click', () => {
            const valorMonto = parseFloat(montoSubir.value);
            
            if (isNaN(valorMonto) || valorMonto <= 0) {
                alert("Por favor, ingresa un monto válido a sumar.");
                return;
            }

            // Sumar al total acumulado de la barra
            acumulado += valorMonto;

            // Guardar en el mini historial
            const ahora = new Date();
            const horaFormateada = ahora.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            historial.unshift({ hora: horaFormateada, monto: valorMonto });

            // Limpiar caja de entrada
            montoSubir.value = '';
            
            // Actualizar la vista de inmediato
            actualizarInterfaz();
        });

        // Acción: Forzar reinicio de fábrica para eliminar memoria vieja del caché
        btnLimpiarTodo.addEventListener('click', () => {
            if (confirm("¿Quieres limpiar todo el historial y empezar con la app en 0?")) {
                localStorage.removeItem(KEY_ACUMULADO);
                localStorage.removeItem(KEY_META);
                localStorage.removeItem(KEY_HISTORIAL);
                acumulado = 0.00;
                meta = 0.00;
                historial = [];
                actualizarInterfaz();
            }
        });

        // Inicialización en el primer arranque
        actualizarInterfaz();
    </script>
</body>
</html>
