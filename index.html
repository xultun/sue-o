<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Montos</title>
    <!-- Tailwind CSS CDN para estilos rápidos y limpios -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gray-50 py-10 px-4 font-sans text-gray-800">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        
        <!-- Encabezado -->
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">Control de Montos</h1>
            <p class="text-sm text-gray-500 mt-1">Registra y administra tus montos guardados localmente</p>
        </header>

        <!-- Balance Total -->
        <div class="bg-gray-900 text-white rounded-xl p-5 mb-6 text-center shadow-inner">
            <span class="text-xs uppercase tracking-wider text-gray-400 font-medium">Total Acumulado</span>
            <h2 id="total-acumulado" class="text-3xl font-extrabold mt-1">S/ 0.00</h2>
        </div>

        <!-- Formulario de Registro -->
        <form id="formulario-registro" class="space-y-4 mb-8">
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Monto (S/)</label>
                <input
                    type="number"
                    id="monto-input"
                    step="0.01"
                    placeholder="0.00"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:bg-white transition-all text-lg font-medium"
                    required
                />
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Concepto / Detalle</label>
                <input
                    type="text"
                    id="concepto-input"
                    placeholder="Ej. Pago de servicios, herramientas, etc."
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:bg-white transition-all text-sm"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-gray-900 text-white font-medium py-3 rounded-lg hover:bg-gray-800 transition-colors shadow-sm active:scale-[0.98] transform cursor-pointer"
            >
                Agregar Registro
            </button>
        </form>

        <!-- Historial de Registros -->
        <div class="space-y-3">
            <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">
                Historial de Movimientos
            </h3>

            <!-- Contenedor dinámico de la lista -->
            <div id="historial-contenedor" class="max-h-64 overflow-y-auto pr-1 space-y-2">
                <!-- Se llena mediante JavaScript -->
            </div>
        </div>

    </div>

    <!-- Lógica de control con Vanilla JS -->
    <script>
        // 1. Inicializar arreglo de registros leyendo el localStorage (empieza vacío [] si no hay datos)
        let registros = JSON.parse(localStorage.getItem('control_gastos_montos')) || [];

        // Referencias del DOM
        const formulario = document.getElementById('formulario-registro');
        const montoInput = document.getElementById('monto-input');
        const conceptoInput = document.getElementById('concepto-input');
        const historialContenedor = document.getElementById('historial-contenedor');
        const totalAcumuladoTxt = document.getElementById('total-acumulado');

        // 2. Función para renderizar la lista e interfaz en pantalla
        function renderizar() {
            // Limpiar contenedor
            historialContenedor.innerHTML = '';

            // Si está vacío, mostrar el diseño de estado inicial cero
            if (registros.length === 0) {
                historialContenedor.innerHTML = `
                    <div class="text-center py-8 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                        <p class="text-sm text-gray-400 font-medium">No hay registros guardados.</p>
                        <p class="text-xs text-gray-400 mt-0.5">Empieza ingresando un monto arriba.</p>
                    </div>
                `;
                totalAcumuladoTxt.textContent = 'S/ 0.00';
                return;
            }

            // Calcular y formatear el total acumulado
            const total = registros.reduce((sum, item) => sum + parseFloat(item.monto), 0).toFixed(2);
            totalAcumuladoTxt.textContent = `S/ ${total}`;

            // Insertar los elementos del historial
            registros.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100 hover:border-gray-200 transition-all group";
                div.innerHTML = `
                    <div>
                        <p class="text-sm font-semibold text-gray-800">${item.concepto}</p>
                        <span class="text-[10px] text-gray-400 font-mono block mt-0.5">${item.fecha}</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-sm font-bold text-gray-900">S/ ${item.monto}</span>
                        <button
                            type="button"
                            onclick="eliminarRegistro(${item.id})"
                            class="text-gray-400 hover:text-red-500 text-xs font-medium p-1 transition-colors cursor-pointer"
                            title="Eliminar"
                        >
                            ✕
                        </button>
                    </div>
                `;
                historialContenedor.appendChild(div);
            });
        }

        // 3. Manejador para agregar un nuevo registro
        formulario.addEventListener('submit', (e) => {
            e.preventDefault();

            const montoVal = parseFloat(montoInput.value);
            const conceptoVal = conceptoInput.value.trim() || 'Registro sin concepto';

            if (isNaN(montoVal) || montoVal <= 0) {
                alert("Por favor, ingresa un monto válido.");
                return;
            }

            // Crear objeto del nuevo movimiento
            const nuevoRegistro = {
                id: Date.now(),
                monto: montoVal.toFixed(2),
                concepto: conceptoVal,
                fecha: new Date().toLocaleDateString('es-PE', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            // Insertar al inicio de la lista, guardar en LocalStorage y renderizar
            registros.unshift(nuevoRegistro);
            localStorage.setItem('control_gastos_montos', JSON.stringify(registros));
            
            // Limpiar inputs
            montoInput.value = '';
            conceptoInput.value = '';

            renderizar();
        });

        // 4. Función global para eliminar un movimiento
        window.eliminarRegistro = function(id) {
            registros = registros.filter(item => item.id !== id);
            
            if (registros.length === 0) {
                localStorage.removeItem('control_gastos_montos');
            } else {
                localStorage.setItem('control_gastos_montos', JSON.stringify(registros));
            }
            
            renderizar();
        };

        // Renderizado inicial al cargar la página por primera vez
        renderizar();
    </script>
</body>
</html>
