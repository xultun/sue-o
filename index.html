<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garra Ahorro v2 - Universitario</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tipografía con fuerza para los marcadores */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap');
        .font-tribuna { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-[#F7F4EB] py-6 px-4 font-sans text-[#2A2A2A]">

    <div class="max-w-md mx-auto bg-[#FDFBF7] rounded-3xl shadow-xl border-2 border-[#E6DFCE] p-5 space-y-5 relative overflow-hidden">
        
        <!-- Franja Granate Institucional -->
        <div class="absolute top-0 left-0 right-0 h-3 bg-[#7A1C2E]"></div>

        <!-- Encabezado Principal -->
        <header class="flex items-center justify-between pt-2">
            <div class="flex items-center space-x-3">
                <div class="w-11 h-11 rounded-full bg-[#7A1C2E] flex items-center justify-center text-[#F7F4EB] font-black text-xl border-2 border-[#D4AF37] shadow-sm font-tribuna">
                    U
                </div>
                <div>
                    <h1 class="text-lg font-black uppercase tracking-tight text-[#7A1C2E] font-tribuna">Garra Ahorro</h1>
                    <p class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">Marcador de finanzas personales</p>
                </div>
            </div>
            <div class="text-2xl text-[#D4AF37]">
                <i class="fas fa-star animate-spin" style="animation-duration: 4s;"></i>
            </div>
        </header>

        <!-- Zona de la Mascota "Garrita" Animada y Dinámica -->
        <div id="contenedor-mascota" class="bg-gradient-to-br from-[#7A1C2E] to-[#59121F] rounded-2xl p-4 text-[#F7F4EB] flex items-center space-x-4 shadow-md border border-[#4D0F1A]">
            <!-- Avatar Visual de la Mascota usando Iconos Interactivos -->
            <div class="w-16 h-16 rounded-full bg-[#FDFBF7] border-2 border-[#D4AF37] flex items-center justify-center text-3xl shadow-inner shrink-0">
                <span id="mascota-emoji">🦁</span>
            </div>
            <div class="flex-1 space-y-1">
                <div class="bg-[#D4AF37] text-[#7A1C2E] text-[10px] font-black uppercase px-2 py-0.5 rounded w-max tracking-wider">
                    Garrita Dice:
                </div>
                <!-- Frase motivacional e identidad merengue -->
                <p id="txt-frase" class="text-xs font-bold leading-tight italic text-gray-100">
                    "¡Y dale U toda la vida! Fija tu meta para arrancar el partido hoy."
                </p>
            </div>
        </div>

        <!-- Ajustar Objetivo Diario -->
        <div class="bg-[#F7F4EB] p-3.5 rounded-xl border border-[#E6DFCE] space-y-2">
            <label class="block text-[10px] font-extrabold text-[#7A1C2E] uppercase tracking-wider">Establecer Meta del Día (S/)</label>
            <div class="flex space-x-2">
                <input 
                    type="number" 
                    id="meta-input" 
                    placeholder="Ej. 60.00" 
                    class="flex-1 px-3 py-2 bg-white border border-[#E6DFCE] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7A1C2E] text-sm font-bold"
                />
                <button 
                    id="btn-fijar-meta" 
                    class="bg-[#7A1C2E] hover:bg-[#611422] text-[#F7F4EB] text-[11px] font-black uppercase tracking-wider px-4 rounded-lg transition-colors cursor-pointer shadow-sm font-tribuna"
                >
                    Fijar Meta
                </button>
            </div>
        </div>

        <!-- Panel del Estadio Monumental / Progreso Visual -->
        <div class="bg-white rounded-2xl p-4 border-2 border-[#7A1C2E] shadow-sm space-y-3">
            <div class="flex justify-between items-end">
                <div>
                    <span class="text-[9px] uppercase tracking-wider text-gray-400 font-extrabold block">Asegurado en Tribuna</span>
                    <h2 id="txt-acumulado" class="text-2xl font-black text-[#7A1C2E] font-tribuna mt-0.5">S/ 0.00</h2>
                </div>
                <div class="text-right">
                    <span class="text-[9px] uppercase tracking-wider text-gray-400 font-extrabold block">Meta Diaria</span>
                    <h3 id="txt-meta" class="text-base font-bold text-[#2A2A2A] mt-0.5">S/ 0.00</h3>
                </div>
            </div>

            <!-- Barra Granate y Oro -->
            <div class="w-full bg-[#F7F4EB] rounded-full h-4 overflow-hidden border border-[#E6DFCE] p-0.5">
                <div id="barra-progreso" class="bg-gradient-to-r from-[#7A1C2E] to-[#D4AF37] h-full w-0 rounded-full transition-all duration-700 ease-out"></div>
            </div>
            
            <div class="flex justify-between text-[11px] font-bold">
                <span id="txt-porcentaje" class="text-[#7A1C2E] uppercase tracking-wide">0% Completado</span>
                <span id="txt-restante" class="text-[#D4AF37] font-black uppercase tracking-wide">Faltan S/ 0.00</span>
            </div>
        </div>

        <!-- Formulario Inyección de Ahorro con Razón/Descripción -->
        <div class="bg-white p-4 rounded-xl border border-[#E6DFCE] space-y-3 shadow-inner">
            <h4 class="text-center text-[11px] font-extrabold text-gray-400 uppercase tracking-wider">Anotar Nuevo Monto Ahorrado</h4>
            
            <div class="grid grid-cols-3 gap-2">
                <!-- Entrada de Monto -->
                <div class="col-span-1 relative">
                    <span class="absolute left-2 top-1/2 -translate-y-1/2 font-bold text-xs text-gray-400">S/</span>
                    <input
                        type="number"
                        id="monto-subir"
                        step="0.01"
                        placeholder="0.00"
                        class="w-full pl-6 pr-1 py-2.5 bg-[#F7F4EB] border border-[#E6DFCE] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7A1C2E] text-sm font-black text-[#7A1C2E]"
                    />
                </div>
                <!-- Entrada de Descripción/Razón -->
                <div class="col-span-2">
                    <input
                        type="text"
                        id="descripcion-subir"
                        placeholder="¿Razón? Ej. Cociné en casa"
                        class="w-full px-3 py-2.5 bg-[#F7F4EB] border border-[#E6DFCE] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7A1C2E] text-xs font-medium text-gray-700"
                    />
                </div>
            </div>

            <button
                id="btn-ahorrar"
                type="button"
                class="w-full bg-[#7A1C2E] hover:bg-[#611422] text-[#F7F4EB] font-black py-3 rounded-lg transition-all shadow-md active:scale-[0.99] transform tracking-widest uppercase text-xs cursor-pointer border-b-4 border-[#4D0F1A] font-tribuna"
            >
                💪 ¡Ahorré Hoy!
            </button>
        </div>

        <!-- Minuto a Minuto con Descripción Integrada -->
        <div class="space-y-2 pt-1 border-t border-[#E6DFCE]">
            <h5 class="text-[10px] font-black text-gray-400 uppercase tracking-wider flex items-center justify-between">
                <span>Historial en la Tribuna</span>
                <i class="fas fa-list-ol"></i>
            </h5>
            <div id="historial-lista" class="max-h-32 overflow-y-auto space-y-1.5 pr-1 text-xs">
                <!-- Inyección dinámica -->
            </div>
        </div>

        <!-- Botón de Reinicio -->
        <div class="text-center pt-1">
            <button 
                id="btn-limpiar-todo" 
                class="text-[9px] text-gray-400 hover:text-red-600 font-bold transition-colors uppercase tracking-wider cursor-pointer"
            >
                <i class="fas fa-undo-alt mr-1"></i> Reiniciar marcador a cero
            </button>
        </div>

    </div>

    <script>
        const KEY_ACUMULADO = 'u_ahorrov2_acumulado';
        const KEY_META = 'u_ahorrov2_meta';
        const KEY_HISTORIAL = 'u_ahorrov2_historial';

        let acumulado = parseFloat(localStorage.getItem(KEY_ACUMULADO)) || 0.00;
        let meta = parseFloat(localStorage.getItem(KEY_META)) || 0.00;
        let historial = JSON.parse(localStorage.getItem(KEY_HISTORIAL)) || [];

        // Los estados de Garrita según el avance del partido financiero
        const estadosGarrita = [
            { limite: 0, emoji: "🦁", frase: "¡Y dale U! Ponle garra y fija una meta para empezar a ganar hoy." },
            { limite: 1, emoji: "👟", frase: "¡Arrancó el partido! Primeros soles guardados. ¡A defender la ventaja!" },
            { limite: 40, emoji: "🔥", frase: "¡Eso es Garra Crema! Metiendo presión en la cancha, ya se siente el avance." },
            { limite: 75, emoji: "🥁", frase: "¡La tribuna explota! Estamos a nada de asegurar el triunfo diario. ¡No bajes el ritmo!" },
            { limite: 100, emoji: "🏆", frase: "¡Finaaaal del partido! ¡Meta cumplida, somos campeones! ¡Y dale U toda la vida! 🎉" }
        ];

        const metaInput = document.getElementById('meta-input');
        const btnFijarMeta = document.getElementById('btn-fijar-meta');
        const montoSubir = document.getElementById('monto-subir');
        const descripcionSubir = document.getElementById('descripcion-subir');
        const btnAhorrar = document.getElementById('btn-ahorrar');
        const btnLimpiarTodo = document.getElementById('btn-limpiar-todo');

        const txtAcumulado = document.getElementById('txt-acumulado');
        const txtMeta = document.getElementById('txt-meta');
        const barraProgreso = document.getElementById('barra-progreso');
        const txtPorcentaje = document.getElementById('txt-porcentaje');
        const txtRestante = document.getElementById('txt-restante');
        const mascotaEmoji = document.getElementById('mascota-emoji');
        const txtFrase = document.getElementById('txt-frase');
        const historialLista = document.getElementById('historial-lista');

        function actualizarInterfaz() {
            localStorage.setItem(KEY_ACUMULADO, acumulado.toString());
            localStorage.setItem(KEY_META, meta.toString());
            localStorage.setItem(KEY_HISTORIAL, JSON.stringify(historial));

            txtAcumulado.textContent = `S/ ${acumulado.toFixed(2)}`;
            txtMeta.textContent = `S/ ${meta.toFixed(2)}`;

            let porcentaje = 0;
            if (meta > 0) {
                porcentaje = Math.min((acumulado / meta) * 100, 100);
            }
            
            let restante = meta - acumulado;
            if (restante < 0) restante = 0;

            barraProgreso.style.width = `${porcentaje}%`;
            txtPorcentaje.textContent = `${Math.round(porcentaje)}% Garra`;
            txtRestante.textContent = restante > 0 ? `Faltan S/ ${restante.toFixed(2)}` : '¡Ganamos! 🌟';

            // Actualización Dinámica del estado de la Mascota
            let estadoActual = estadosGarrita[0];
            for (let i = 0; i < estadosGarrita.length; i++) {
                if (porcentaje >= estadosGarrita[i].limite) {
                    estadoActual = estadosGarrita[i];
                }
            }
            // Si la meta está en cero, forzar estado inicial
            if (meta === 0) estadoActual = estadosGarrita[0];

            mascotaEmoji.textContent = estadoActual.emoji;
            txtFrase.textContent = estadoActual.frase;

            // Renderizado del historial detallado
            historialLista.innerHTML = '';
            if (historial.length === 0) {
                historialLista.innerHTML = `<p class="text-gray-400 text-center py-2 italic text-[11px]">Marcador en 0. Agrega tu primer ahorro.</p>`;
            } else {
                historial.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "flex justify-between items-center bg-white px-3 py-2 rounded-xl border border-[#E6DFCE] shadow-sm";
                    itemDiv.innerHTML = `
                        <div class="space-y-0.5">
                            <p class="font-bold text-[#2A2A2A] text-xs leading-tight">${item.descripcion}</p>
                            <span class="text-gray-400 font-mono text-[9px] block"><i class="far fa-clock mr-1 text-[#7A1C2E]"></i>${item.hora}</span>
                        </div>
                        <span class="font-black text-[#7A1C2E] text-xs font-tribuna shrink-0">+ S/ ${parseFloat(item.monto).toFixed(2)}</span>
                    `;
                    historialLista.appendChild(itemDiv);
                });
            }
        }

        btnFijarMeta.addEventListener('click', () => {
            const valorMeta = parseFloat(metaInput.value);
            if (isNaN(valorMeta) || valorMeta <= 0) {
                alert("Por favor, ingresa una meta válida para el partido de hoy.");
                return;
            }
            meta = valorMeta;
            metaInput.value = '';
            actualizarInterfaz();
        });

        btnAhorrar.addEventListener('click', () => {
            const valorMonto = parseFloat(montoSubir.value);
            let razon = descripcionSubir.value.trim();

            if (isNaN(valorMonto) || valorMonto <= 0) {
                alert("Por favor, ingresa un monto válido a subir.");
                return;
            }

            // Si no introduce descripción, asignamos una por defecto
            if (!razon) {
                razon = "Ahorro Garra Crema";
            }

            acumulado += valorMonto;

            const ahora = new Date();
            const horaFormateada = ahora.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
            
            // Guardar con su respectiva descripción
            historial.unshift({ 
                hora: horaFormateada, 
                monto: valorMonto, 
                descripcion: razon 
            });

            montoSubir.value = '';
            descripcionSubir.value = '';
            actualizarInterfaz();
        });

        btnLimpiarTodo.addEventListener('click', () => {
            if (confirm("¿Seguro de reiniciar todo el marcador y empezar el partido desde cero?")) {
                localStorage.removeItem(KEY_ACUMULADO);
                localStorage.removeItem(KEY_META);
                localStorage.removeItem(KEY_HISTORIAL);
                acumulado = 0.00;
                meta = 0.00;
                historial = [];
                actualizarInterfaz();
            }
        });

        actualizarInterfaz();
    </script>
</body>
</html>
